[supervisord]
nodaemon=true
user=root

[program:xvfb]
command=Xvfb :0 -screen 0 %(ENV_RESOLUTION)s
autorestart=true

[program:fluxbox]
command=fluxbox
autorestart=true

[program:x11vnc]
command=x11vnc -display :0 -forever -shared -nopw -rfbport 5900
autorestart=true

[program:novnc]
command=websockify --web /usr/share/novnc/ %(ENV_PORT)s localhost:5900
autorestart=true

[program:chromium]
command=chromium --no-sandbox --disable-dev-shm-usage --start-maximized --no-first-run --disable-infobars --load-extension=/extension
autorestart=true
environment=DISPLAY=":0"
